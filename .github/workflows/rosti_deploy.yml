name: Deploy into Roští.cz

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      HOST: ssh.rosti.cz
      USER: app
      PORT: 14603
      PHP_VERSION: 8.4.12
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.ROSTI_DEPLOY_SSH_KEY }}
      
      - name: Add Rosti to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p $PORT -H $HOST >> ~/.ssh/known_hosts
      
      - name: Setup PHP version
        run: |
          ssh -p $PORT $USER@$HOST /usr/local/bin/rosti php $PHP_VERSION
      
      - name: Create .env on server
        run: |
          ssh -p $PORT $USER@$HOST << 'ENDSSH'
            cat > /srv/app/.env << 'ENVEOF'
          ${{ secrets.ENV }}
          ENVEOF
          ENDSSH
      
      - name: Copy code to server
        run: |
          rsync -avz --delete-after --exclude=.git --exclude=.env -e "ssh -p $PORT" ./ $USER@$HOST:/srv/app/
      
      - name: Create necessary directories
        run: |
          ssh -p $PORT $USER@$HOST << 'ENDSSH'
            mkdir -p /srv/app/tmp/feeds /srv/app/tmp/logs /srv/app/public/logs /srv/app/public/feeds /srv/app/public/uploads
            chmod 755 /srv/app/tmp/feeds /srv/app/tmp/logs /srv/app/public/logs /srv/app/public/feeds /srv/app/public/uploads
            chmod +x /srv/app/scripts/watchdog_feeds.sh 2>/dev/null || true
          ENDSSH
      
      - name: Restart application
        run: |
          ssh -p $PORT $USER@$HOST supervisorctl restart app
